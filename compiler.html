<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Query Core - SQL to MongoDB Transpiler</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            color: #00ffff;
            font-family: 'Courier New', 'Consolas', monospace;
            font-size: 18px;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        /* CRT Scanlines - Non-interactive */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,255,255,0.03) 2px,
                rgba(0,255,255,0.03) 4px
            );
            pointer-events: none;
            z-index: 5;
        }
        /* Particles Canvas */
        canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: 1; 
            pointer-events: none;
        }
        h1 {
            position: relative;
            z-index: 25;
            text-align: center;
            font-size: 48px;
            margin: 20px 0;
            background: linear-gradient(45deg, #00ffff, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px #00ffff, 0 0 60px #ffaa00;
            animation: glowPulse 2s ease-in-out infinite alternate;
        }
        @keyframes glowPulse {
            from { text-shadow: 0 0 20px #00ffff, 0 0 40px #ffaa00; }
            to { text-shadow: 0 0 40px #00ffff, 0 0 80px #ffaa00; }
        }
        .input-section {
            position: relative;
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 40px 0;
            animation: slideDown 1s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-50px); } }
        #queryInput {
            flex: 1;
            max-width: 600px;
            padding: 20px;
            font-size: 18px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #00ffff;
            border-radius: 10px;
            color: #00ffff;
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
            outline: none;
            transition: all 0.3s;
        }
        #queryInput:focus { box-shadow: 0 0 30px #00ffff; }
        #compileBtn {
            position: relative;
            z-index: 30;
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(45deg, #ffaa00, #00ffff);
            border: none;
            border-radius: 10px;
            color: #000;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,170,0,0.6);
            transition: all 0.3s;
        }
        #compileBtn:hover { transform: scale(1.05); box-shadow: 0 0 30px #ffaa00; }
        .panels {
            position: relative;
            z-index: 20;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px 40px;
        }
        .panel {
            min-height: 300px;
            background: rgba(0,20,30,0.8);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 30px;
            opacity: 0.5;
            transform: translateX(-100px);
            transition: all 1s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .panel.active {
            opacity: 1;
            transform: translateX(0);
            box-shadow: 0 0 40px rgba(0,255,255,0.4);
        }
        .panel:nth-child(2).active { transform: translateX(0) scale(1.02); animation-delay: 0.2s; }
        .panel:nth-child(3).active { transform: translateX(0) rotateY(5deg); animation-delay: 0.4s; }
        .panel h3 {
            color: #ffaa00;
            margin-bottom: 20px;
            text-align: center;
            font-size: 24px;
            text-shadow: 0 0 10px #ffaa00;
        }
        .tokens-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            justify-content: center; 
        }
        .token-box {
            background: linear-gradient(145deg, rgba(0,255,255,0.3), rgba(0,150,255,0.3));
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid rgba(0,255,255,0.6);
            opacity: 0;
            transform: scale(0.8) rotateY(-20deg);
            transition: all 0.6s cubic-bezier(0.68,-0.55,0.265,1.55);
            box-shadow: 
                0 0 20px rgba(0,255,255,0.6),
                inset 0 0 20px rgba(255,255,255,0.1),
                0 8px 32px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .token-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: rotate(45deg);
            transition: all 0.6s;
            opacity: 0;
        }
        .token-box:hover::before { opacity: 1; transform: rotate(45deg) translateX(50%) translateY(50%); }
        .token-box:hover {
            transform: scale(1.1) rotateY(0deg);
            box-shadow: 0 0 40px rgba(0,255,255,1);
        }
        .token-box.animate { 
            opacity: 1; 
            transform: scale(1) rotateY(0deg); 
        }
        table {
            width: 100%;
            border-collapse: collapse;
            color: #00ffff;
            margin-top: 20px;
            animation: tableSlide 0.8s ease-out;
        }
        @keyframes tableSlide { from { opacity: 0; transform: translateX(50px); } }
        th, td { padding: 12px; text-align: left; border: 1px solid #00ffff80; }
        th { background: rgba(255,170,0,0.3); color: #ffaa00; }
        .mongo-output {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
            color: #ffaa00;
            text-shadow: 0 0 30px #ffaa00;
            opacity: 0;
            animation: mongoGlow 2s ease-out forwards;
        }
        @keyframes mongoGlow { to { opacity: 1; } }
        .error { 
            color: #ff4444 !important; 
            text-shadow: 0 0 20px #ff4444 !important;
            animation: shake 0.5s, glowPulseRed 1s infinite; 
        }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
        @keyframes glowPulseRed { 0%,100%{text-shadow:0 0 10px #ff4444;} 50%{text-shadow:0 0 25px #ff4444;} }
        .arrow { 
            font-size: 36px; 
            color: #ffaa00; 
            text-shadow: 0 0 15px #ffaa00;
            animation: bounce 1.5s infinite; 
        }
        @keyframes bounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
        #status { 
            position: relative; 
            z-index: 25;
            text-align: center; 
            margin: 20px; 
            font-size: 24px; 
            color: #ffaa00; 
            opacity: 0; 
            transition: opacity 0.5s; 
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <h1>QUANTUM QUERY CORE</h1>
    
    <div class="input-section">
        <input type="text" id="queryInput" placeholder="e.g. SELECT * FROM players WHERE rank = 'Grandmaster'">
        <button id="compileBtn">COMPILE</button>
    </div>
    
    <div id="status"></div>
    
    <div class="panels">
        <div id="lexer-panel" class="panel">
            <h3>LEXER</h3>
            <div class="tokens-container" id="tokens"></div>
        </div>
        <div id="parser-panel" class="panel">
            <h3>PARSER</h3>
            <div id="mapping">
                <table>
                    <thead><tr><th>Component</th><th>Value</th></tr></thead>
                    <tbody id="mapping-body"></tbody>
                </table>
                <div style="text-align:center; margin-top:20px;">
                    <span class="arrow">➜</span> TARGET COLLECTION
                </div>
            </div>
        </div>
        <div id="codegen-panel" class="panel">
            <h3>CODE GEN</h3>
            <div id="mongo-query" class="mongo-output"></div>
        </div>
    </div>

    <script>
        const queryInput = document.getElementById('queryInput');
        const compileBtn = document.getElementById('compileBtn');
        const statusEl = document.getElementById('status');
        const panels = {
            lexer: document.getElementById('lexer-panel'),
            parser: document.getElementById('parser-panel'),
            codegen: document.getElementById('codegen-panel')
        };

        // Optimized Particles (50 for performance)
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let animationId;
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particles = [];
        for(let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                size: Math.random() * 1.5 + 0.5,
                alpha: Math.random() * 0.5 + 0.2
            });
        }

        function animateParticles() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                p.alpha = 0.2 + Math.sin(Date.now() * 0.005 + p.x * 0.01) * 0.3;
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = '#ffaa00';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
            animationId = requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // Typewriter
        function typeWriter(element, text, speed = 80, callback) {
            element.textContent = '';
            element.style.opacity = '1';
            let i = 0;
            const timer = setInterval(() => {
                element.textContent += text[i];
                i++;
                if (i > text.length) {
                    clearInterval(timer);
                    callback && callback();
                }
            }, speed);
        }

        // Main compile with sequential slide-ins
        compileBtn.addEventListener('click', () => {
            const query = queryInput.value.trim();
            if (!query) return;

            // Reset
            Object.values(panels).forEach(p => p.classList.remove('active'));
            document.getElementById('tokens').innerHTML = '';
            document.getElementById('mapping-body').innerHTML = '';
            document.getElementById('mongo-query').textContent = '';
            statusEl.style.opacity = 1;
            statusEl.textContent = 'COMPILING...';

            // Step 1: Lexer (slide from left)
            setTimeout(() => {
                statusEl.textContent = 'LEXER ACTIVE';
                const upperQuery = query.toUpperCase().replace(/'/g, '"').replace(/=/g, ' = ').split(/\s+/).filter(Boolean);
                const tokenTypes = {'SELECT':'Keyword','FROM':'Keyword','WHERE':'Keyword','*':'Wildcard','=':'Operator'};
                const tokensCont = document.getElementById('tokens');
                upperQuery.forEach((token, idx) => {
                    setTimeout(() => {
                        const box = document.createElement('div');
                        box.className = 'token-box animate';
                        box.style.animationDelay = `${idx * 0.15}s`;
                        box.textContent = `${token} (${tokenTypes[token] || (isNaN(token) ? 'ID' : 'Literal')})`;
                        tokensCont.appendChild(box);
                    }, idx * 150);
                });
                panels.lexer.classList.add('active');
            }, 800);

            // Step 2: Parser (slide center)
            setTimeout(() => {
                statusEl.textContent = 'PARSER ACTIVE';
                try {
                    const upperQuery = query.toUpperCase().split(/\s+/).filter(Boolean);
                    const fromIdx = upperQuery.indexOf('FROM');
                    const table = upperQuery[fromIdx + 1]?.toLowerCase() || 'unknown';
                    const whereIdx = upperQuery.indexOf('WHERE');
                    const key = whereIdx > -1 ? upperQuery[whereIdx + 1]?.toLowerCase() : 'none';
                    const valRaw = whereIdx > -1 ? query.split('=')[1]?.trim().replace(/['"]/g, '') : 'none';
                    const rows = [
                        ['Target Collection', table],
                        ['Filter Key', key],
                        ['Filter Value', valRaw]
                    ];
                    const tbody = document.getElementById('mapping-body');
                    rows.forEach((row, idx) => {
                        setTimeout(() => {
                            const tr = document.createElement('tr');
                            tr.innerHTML = `<td>${row[0]}</td><td>${row[1]}</td>`;
                            tbody.appendChild(tr);
                        }, idx * 250);
                    });
                    panels.parser.classList.add('active');
                } catch (e) {
                    document.getElementById('mapping').innerHTML += '<div class="error" style="text-align:center;font-size:24px;">SYNTAX ERROR</div>';
                    panels.parser.classList.add('active');
                }
            }, 2800);

            // Step 3: Code Gen (slide + glow from right)
            setTimeout(() => {
                statusEl.textContent = 'CODE GEN COMPLETE';
                statusEl.style.color = '#00ff88';
                try {
                    const upperQuery = query.toUpperCase().split(/\s+/).filter(Boolean);
                    const fromIdx = upperQuery.indexOf('FROM');
                    const table = upperQuery[fromIdx + 1]?.toLowerCase() || 'unknown';
                    const whereIdx = upperQuery.indexOf('WHERE');
                    let mongo = `db.${table}.find({})`;
                    if (whereIdx !== -1) {
                        const key = upperQuery[whereIdx + 1]?.toLowerCase();
                        const valRaw = query.split('=')[1]?.trim().replace(/['"]/g, '') || '';
                        const val = isNaN(valRaw) ? `"${valRaw}"` : valRaw;
                        mongo = `db.${table}.find({ ${key}: ${val} })`;
                    }
                    typeWriter(document.getElementById('mongo-query'), mongo, 60);
                    panels.codegen.classList.add('active');
                } catch (e) {
                    const mongoEl = document.getElementById('mongo-query');
                    mongoEl.textContent = 'GENERATION FAILED';
                    mongoEl.className = 'error';
                    panels.codegen.classList.add('active');
                }
                setTimeout(() => { statusEl.style.opacity = 0; }, 3000);
            }, 5200);
        });

        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') compileBtn.click();
        });
    </script>
</body>
</html>
